name: Examples Tests

on:
  workflow_dispatch:

jobs:
  examples-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.catalog.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build examples matrix
        id: catalog
        run: echo "$(elixir scripts/examples_catalog.exs matrix)" >> "$GITHUB_OUTPUT"

  examples-e2e:
    needs: examples-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.examples-matrix.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.4"
          otp-version: "28.1.2"

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install example dependencies
        working-directory: ${{ matrix.cwd }}
        run: mix deps.get

      - name: Run example-owned tests
        working-directory: ${{ matrix.cwd }}
        run: mix test

      - name: Upload example test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: example-tests-${{ matrix.name }}
          path: ${{ matrix.cwd }}/tmp/test_artifacts
          if-no-files-found: ignore
