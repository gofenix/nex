name: Examples E2E

on:
  workflow_dispatch:

jobs:
  examples-e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: alpine_showcase
            cwd: examples/alpine_showcase
          - name: auth_demo
            cwd: examples/auth_demo
          - name: counter
            cwd: examples/counter
          - name: dynamic_routes
            cwd: examples/dynamic_routes
          - name: energy_dashboard
            cwd: examples/energy_dashboard
          - name: error_pages
            cwd: examples/error_pages
          - name: guestbook
            cwd: examples/guestbook
          - name: ratelimit
            cwd: examples/ratelimit
          - name: todos
            cwd: examples/todos
          - name: todos_api
            cwd: examples/todos_api
          - name: upload
            cwd: examples/upload
          - name: validator
            cwd: examples/validator
          - name: websocket
            cwd: examples/websocket

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.4"
          otp-version: "28.1.2"

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install E2E dependencies
        working-directory: e2e
        run: mix deps.get

      - name: Install example dependencies
        working-directory: ${{ matrix.cwd }}
        run: mix deps.get

      - name: Run example E2E
        working-directory: e2e
        run: mix e2e.example --name ${{ matrix.name }}

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.name }}
          path: e2e/artifacts
          if-no-files-found: ignore
